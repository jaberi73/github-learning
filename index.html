<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>اولین پروژه GitHub من</title>

    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background: #f4f7f9;
            margin: 0;
            padding: 30px;
            color: #222;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #238636;
        }

        .message {
            background: #eef8f0;
            border-right: 5px solid #238636;
            padding: 15px;
            margin-top: 20px;
        }

        button {
            background: #238636;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #196c2e;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>اولین پروژه من در GitHub</h1>

        <p>
            این صفحه توسط محسن جابری ایجاد و از طریق
            GitHub Pages منتشر شده است.
        </p>

        <div class="message" id="message">
            GitHub فقط محل نگهداری فایل نیست؛
            یک ابزار مدیریت نسخه و انتشار پروژه است.
        </div>

        <br>

        <button onclick="changeMessage()">
            نمایش پیام
        </button>

    </div>

    <script>
        function changeMessage() {
            document.getElementById("message").innerText =
                "تبریک! فایل HTML و JavaScript شما با موفقیت اجرا شد.";
        }
    </script>

</body>
</html>
